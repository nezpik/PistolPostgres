name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy

      - name: Install Postgres 16 + hypopg
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-16 postgresql-16-hypopg

      - name: Configure & start Postgres
        run: |
          sudo tee -a /etc/postgresql/16/main/postgresql.conf >/dev/null <<'EOF'
          shared_preload_libraries = 'pg_stat_statements'
          pg_stat_statements.track = all
          EOF
          sudo pg_ctlcluster 16 main restart
          sudo -u postgres psql -c "CREATE ROLE pistol SUPERUSER LOGIN PASSWORD 'pistol';"
          sudo -u postgres psql -c "CREATE DATABASE pistol OWNER pistol;"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.toml') }}

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        env:
          PISTOL_TEST_DATABASE_URL: postgres://pistol:pistol@localhost:5432/pistol
        run: cargo test --all-targets

      - name: Build with llm feature
        run: cargo build --features llm
